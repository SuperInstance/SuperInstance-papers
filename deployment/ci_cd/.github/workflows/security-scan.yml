# Security Scanning CI/CD Pipeline
# Implements comprehensive security checks for all changes

name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * *'  # Daily security scan

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Trivy vulnerability scanner
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build image
      run: |
        docker build -f deployment/docker/Dockerfile -t ${{ env.IMAGE_NAME }}:latest .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Upload Trivy results as artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: trivy-results
        path: trivy-results.sarif

  # Grype vulnerability scanner
  grype-scan:
    name: Grype Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build image
      run: |
        docker build -f deployment/docker/Dockerfile -t ${{ env.IMAGE_NAME }}:latest .

    - name: Run Grype vulnerability scanner
      uses: anchore/scan-action@v3
      with:
        image: ${{ env.IMAGE_NAME }}:latest
        fail-build: true
        severity-cutoff: high
        format: sarif
        output: grype-results.sarif

    - name: Upload Grype results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'grype-results.sarif'

    - name: Upload Grype results as artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: grype-results
        path: grype-results.sarif

  # Kube-bench for Kubernetes compliance
  kube-bench:
    name: Kubernetes Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run kube-bench
      uses: aquasecurity/kube-bench-action@v0.1.0
      with:
        directory: deployment/kubernetes
        version: v1.27

    - name: Upload kube-bench results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: kube-bench-results
        path: kube-bench-report.html

  # Kubesec for security checks
  kubesec-scan:
    name: Kubesec Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Kubesec
      run: |
        docker run --rm -v "$(pwd):/data" kubesec/kubesec:latest scan /data/deployment/kubernetes/*.yaml

    - name: Upload Kubesec results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: kubesec-results
        path: kubesec-report.json

  # Checkov for Infrastructure as Code security
  checkov-scan:
    name: Checkov IaC Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Checkov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: deployment/
        framework: terraform,kubernetes
        output_format: cli
        soft_fail: false
        quiet: true

    - name: Upload Checkov results as artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: checkov-results
        path: checkov-report.csv

  # ShellCheck for shell script security
  shellcheck:
    name: Shell Script Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: './deployment'
        severity: warning
        format: gcc

    - name: Upload ShellCheck results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: shellcheck-results
        path: shellcheck-results.txt

  # Snyk for dependency scanning
  snyk-scan:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

    - name: Upload Snyk results to GitHub Security
      uses: snyk/actions/generate-sarif@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        sarif-file: snyk.sarif

    - name: Upload Snyk results as artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: snyk-results
        path: snyk.sarif

  # CodeQL for advanced security analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:${{matrix.language}}"

  # Dockerfile security check
  dockerfile-security:
    name: Dockerfile Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Dockerfile Lint
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: deployment/docker/Dockerfile
        failure-threshold: warning

    - name: Check for secrets in Dockerfile
      run: |
        if grep -r "PASSWORD\|SECRET\|KEY" deployment/docker/Dockerfile; then
          echo "WARNING: Possible secrets found in Dockerfile"
          exit 1
        fi

  # Secrets detection
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD

  # Image signing verification
  image-verification:
    name: Container Image Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.1.1

    - name: Verify image signature
      run: |
        cosign verify ghcr.io/${{ github.repository }}:latest \
          --signature https://github.com/${{ github.repository }}/releases/download/v1.0.0/image.sig \
          --certificate https://github.com/${{ github.repository }}/releases/download/v1.0.0/image.pem

  # Aggregate security results
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [trivy-scan, grype-scan, kube-bench, checkov-scan, shellcheck, codeql]
    if: always()
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3

    - name: Generate security report
      run: |
        echo "# Security Scan Report" > security-report.md
        echo "" >> security-report.md
        echo "## Scan Date: $(date)" >> security-report.md
        echo "" >> security-report.md
        echo "## Scanners Run:" >> security-report.md
        echo "- Trivy" >> security-report.md
        echo "- Grype" >> security-report.md
        echo "- Kube-bench" >> security-report.md
        echo "- Checkov" >> security-report.md
        echo "- ShellCheck" >> security-report.md
        echo "- CodeQL" >> security-report.md
        echo "" >> security-report.md
        echo "## Results:" >> security-report.md
        cat security-report.md

    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security-report.md
