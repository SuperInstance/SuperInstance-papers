# POLLN Development Docker Compose
# Full-stack development environment with all services
# Startup time: ~30 seconds
# Services: API, PostgreSQL, Redis, Monitoring

version: '3.9'

services:
  # ==========================================================================
  # POLLN API Server
  # ==========================================================================
  api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: development
    container_name: polln-api-dev
    hostname: api
    ports:
      - "3000:3000"   # WebSocket API
      - "9229:9229"   # Node.js debugging
      - "9464:9464"   # Prometheus metrics
    environment:
      - NODE_ENV=development
      - POLLN_API_PORT=3000
      - POLLN_API_HOST=0.0.0.0
      - POLLN_AUTH_ENABLED=false
      - POLLN_RATE_LIMIT_RPM=1000
      - POLLN_LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=polln
      - POSTGRES_USER=polln
      - POSTGRES_PASSWORD=polln_dev_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
    volumes:
      - ../../src:/app/src:ro
      - ../../dist:/app/dist
      - ../../examples:/app/examples:ro
      - polln-data:/app/.polln
      - polln-agents:/app/.agents
      - polln-logs:/app/logs
    networks:
      - polln-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: polln-postgres-dev
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=polln
      - POSTGRES_USER=polln
      - POSTGRES_PASSWORD=polln_dev_password
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - polln-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polln -d polln"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=1310kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"

  # ==========================================================================
  # Redis Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: polln-redis-dev
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - polln-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command:
      - "redis-server"
      - "--appendonly yes"
      - "--maxmemory 256mb"
      - "--maxmemory-policy allkeys-lru"
      - "--save 900 1"
      - "--save 300 10"
      - "--save 60 10000"

  # ==========================================================================
  # Monitoring Stack
  # ==========================================================================
  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: polln-prometheus-dev
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - polln-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  # Grafana for monitoring dashboards
  grafana:
    image: grafana/grafana:10.0.0
    container_name: polln-grafana-dev
    hostname: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - polln-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: polln-jaeger-dev
    hostname: jaeger
    ports:
      - "5775:5775/udp"     # accept zipkin.thrift over compact thrift protocol
      - "6831:6831/udp"     # accept jaeger.thrift over compact thrift protocol
      - "6832:6832/udp"     # accept jaeger.thrift over binary thrift protocol
      - "5778:5778"         # serve configs
      - "16686:16686"       # serve frontend (React UI)
      - "14268:14268"       # accept jaeger.thrift directly from clients
      - "14250:14250"       # accept model.proto
      - "9411:9411"         # Zipkin compatible endpoint
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
    networks:
      - polln-network
    restart: unless-stopped

  # ==========================================================================
  # Optional Services
  # ==========================================================================
  # MongoDB for flexible document storage (optional)
  # mongodb:
  #   image: mongo:7
  #   container_name: polln-mongodb-dev
  #   hostname: mongodb
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     - MONGO_INITDB_DATABASE=polln
  #     - MONGO_INITDB_ROOT_USERNAME=mongoadmin
  #     - MONGO_INITDB_ROOT_PASSWORD=changeme
  #   volumes:
  #     - mongodb-data:/data/db
  #   networks:
  #     - polln-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s

  # PgAdmin for PostgreSQL management (optional)
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: polln-pgadmin-dev
  #   hostname: pgadmin
  #   ports:
  #     - "5050:80"
  #   environment:
  #     - PGADMIN_DEFAULT_EMAIL=admin@polln.local
  #     - PGADMIN_DEFAULT_PASSWORD=admin
  #     - PGADMIN_CONFIG_SERVER_MODE=False
  #   volumes:
  #     - pgadmin-data:/var/lib/pgadmin
  #   networks:
  #     - polln-network
  #   restart: unless-stopped
  #   depends_on:
  #     - postgres

  # Redis Commander for Redis management (optional)
  # redis-commander:
  #   image: rediscommander/redis-commander:latest
  #   container_name: polln-redis-commander-dev
  #   hostname: redis-commander
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     - REDIS_HOSTS=local:redis:6379
  #   networks:
  #     - polln-network
  #   restart: unless-stopped
  #   depends_on:
  #     - redis

networks:
  polln-network:
    driver: bridge
    name: polln-network
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  polln-data:
    name: polln-data-dev
  polln-agents:
    name: polln-agents-dev
  polln-logs:
    name: polln-logs-dev
  postgres-data:
    name: polln-postgres-data-dev
  redis-data:
    name: polln-redis-data-dev
  prometheus-data:
    name: polln-prometheus-data-dev
  grafana-data:
    name: polln-grafana-data-dev
  # mongodb-data:
  #   name: polln-mongodb-data-dev
  # pgadmin-data:
  #   name: polln-pgadmin-data-dev
