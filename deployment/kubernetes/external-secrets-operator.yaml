# External Secrets Operator Deployment
# This operator syncs secrets from AWS Secrets Manager to Kubernetes

---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    name: external-secrets
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# SecretStore for AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: polln
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # IRSA will provide credentials automatically
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa

---
# ExternalSecret for database credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: polln-database-credentials
  namespace: polln
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: polln-database-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        postgres-password: "{{ .POSTGRES_PASSWORD }}"
        database-url: "postgresql://polln:{{ .POSTGRES_PASSWORD }}@postgres:5432/polln"
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: polln/prod/postgres-password

---
# ExternalSecret for Redis credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: polln-redis-credentials
  namespace: polln
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: polln-redis-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        redis-password: "{{ .REDIS_PASSWORD }}"
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: polln/prod/redis-password

---
# ExternalSecret for JWT credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: polln-jwt-credentials
  namespace: polln
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: polln-jwt-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        jwt-secret: "{{ .JWT_SECRET }}"
        jwt-issuer: "{{ .JWT_ISSUER }}"
        jwt-audience: "{{ .JWT_AUDIENCE }}"
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: polln/prod/jwt-secret
    - secretKey: JWT_ISSUER
      remoteRef:
        key: polln/prod/jwt-issuer
    - secretKey: JWT_AUDIENCE
      remoteRef:
        key: polln/prod/jwt-audience

---
# ExternalSecret for API keys
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: polln-api-keys
  namespace: polln
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: polln-api-keys
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        deepinfra-api-key: "{{ .DEEPINFRA_API_KEY }}"
        groq-api-key: "{{ .GROQ_API_KEY }}"
        deepseek-api-key: "{{ .DEEPSEEK_API_KEY }}"
  data:
    - secretKey: DEEPINFRA_API_KEY
      remoteRef:
        key: polln/prod/deepinfra-api-key
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: polln/prod/groq-api-key
    - secretKey: DEEPSEEK_API_KEY
      remoteRef:
        key: polln/prod/deepseek-api-key

---
# ExternalSecret for monitoring credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: polln-monitoring-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: grafana-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        admin-user: "{{ .GRAFANA_ADMIN_USER }}"
        admin-password: "{{ .GRAFANA_ADMIN_PASSWORD }}"
  data:
    - secretKey: GRAFANA_ADMIN_USER
      remoteRef:
        key: polln/prod/grafana-admin-user
    - secretKey: GRAFANA_ADMIN_PASSWORD
      remoteRef:
        key: polln/prod/grafana-admin-password

---
# Service Account for External Secrets Operator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: polln
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ExternalSecretsRole
