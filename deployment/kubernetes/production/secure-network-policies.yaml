# Secure Network Policies for POLLN Production
# Implements defense-in-depth with least privilege network access

---
# Default deny all ingress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: polln
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Default deny all egress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: polln
spec:
  podSelector: {}
  policyTypes:
  - Egress

---
# Allow API pods to talk to PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-to-postgres
  namespace: polln
spec:
  podSelector:
    matchLabels:
      app: polln-api
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432

---
# Allow API pods to talk to Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-to-redis
  namespace: polln
spec:
  podSelector:
    matchLabels:
      app: polln-api
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

---
# Allow API pods to egress to external APIs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-to-external-apis
  namespace: polln
spec:
  podSelector:
    matchLabels:
      app: polln-api
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 53  # DNS
  - to:
    - namespaceSelector: {}  # Any namespace
    ports:
    - protocol: TCP
      port: 443  # HTTPS only

---
# Allow ingress to API from ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-from-ingress
  namespace: polln
spec:
  podSelector:
    matchLabels:
      app: polln-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000

---
# Allow PostgreSQL to receive from API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-from-api
  namespace: polln
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: polln-api
    ports:
    - protocol: TCP
      port: 5432

---
# Allow Redis to receive from API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-from-api
  namespace: polln
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: polln-api
    ports:
    - protocol: TCP
      port: 6379

---
# Allow monitoring to scrape metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring
  namespace: polln
spec:
  podSelector:
    matchLabels:
      app: polln-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9464  # Prometheus metrics

---
# GPU K8s namespace network policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: gpu-k8s
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: gpu-k8s
spec:
  podSelector: {}
  policyTypes:
  - Egress

---
# Allow GPU simulator to talk to API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gpu-simulator-to-api
  namespace: gpu-k8s
spec:
  podSelector:
    matchLabels:
      app: gpu-simulator
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: polln
      podSelector:
        matchLabels:
          app: polln-api
    ports:
    - protocol: TCP
      port: 3000

---
# Allow monitoring to scrape GPU metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gpu-monitoring
  namespace: gpu-k8s
spec:
  podSelector:
    matchLabels:
      app: gpu-simulator
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090  # GPU metrics

---
# Monitoring namespace network policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-scrape
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 9464  # Scrape metrics
  - to:
    - namespaceSelector:
        matchLabels:
          name: gpu-k8s
    ports:
    - protocol: TCP
      port: 9090  # GPU metrics

---
# Allow Grafana to query Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-to-prometheus
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090

---
# Allow ingress to monitoring from specific sources
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
