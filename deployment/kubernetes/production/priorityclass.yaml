# POLLN Production Priority Classes
# Ensure critical pods get scheduling priority

apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: polln-critical
value: 1000000
globalDefault: false
description: "Critical priority for POLLN API pods"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: polln-high
value: 100000
globalDefault: false
description: "High priority for POLLN background jobs"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: polln-normal
value: 10000
globalDefault: false
description: "Normal priority for POLLN batch jobs"
