# Secure Ingress Configuration with TLS and Security Headers
# Implements OWASP security best practices

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polln-ingress
  namespace: polln
  annotations:
    # TLS configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/private-key-algorithm: "RSA"
    cert-manager.io/private-key-size: "4096"

    # Security headers
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.polln.io; frame-ancestors 'none';";

    # CORS configuration (restrict to specific origins)
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://polln.io"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Requested-With, X-CSRF-Token"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "3600"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/limit-burst: "100"
    nginx.ingress.kubernetes.io/limit-rate-after: "512"
    nginx.ingress.kubernetes.io/limit-rate: "256"

    # Request size limits
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/enable-websocket: "true"

    # Security
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditLog /var/log/modsec_audit.log
      SecAuditEngine RelevantOnly
      SecRuleRemoveById 949110 941130 941100 941130 942200 942260

    # Real IP header
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"

    # Whitelist (only allow specific IPs for admin endpoints)
    nginx.ingress.kubernetes.io/whitelist-source-range: "0.0.0.0/0"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - polln.io
    - api.polln.io
    - "*.polln.io"
    secretName: polln-tls-cert
  rules:
  - host: polln.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: polln-api
            port:
              number: 3000
  - host: api.polln.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: polln-api
            port:
              number: 3000

---
# Certificate resource for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: polln-tls-cert
  namespace: polln
spec:
  secretName: polln-tls-cert
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days before expiration
  dnsNames:
  - polln.io
  - api.polln.io
  - "*.polln.io"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

---
# ClusterIssuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: security@polln.io
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
      selector:
        dnsZones:
        - polln.io

---
# Monitoring ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: monitoring-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Monitoring Access"
    # Basic auth for monitoring endpoints
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - monitoring.polln.io
    - grafana.polln.io
    - prometheus.polln.io
    secretName: monitoring-tls-cert
  rules:
  - host: grafana.polln.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
  - host: prometheus.polln.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090

---
# Basic auth for monitoring
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-basic-auth
  namespace: monitoring
type: Opaque
data:
  auth: YWRtaW46JGFwcjEkSDYzaHhoTGRPJHcwTnZIVjNZVHJjTGRlTGlNLgoK
