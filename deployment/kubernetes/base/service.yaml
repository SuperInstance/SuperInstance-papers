# POLLN Kubernetes Service
# Load balancer for API access

apiVersion: v1
kind: Service
metadata:
  name: polln-api
  labels:
    app: polln
    component: api
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9464
    targetPort: metrics
    protocol: TCP
  selector:
    app: polln
    component: api
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: polln-api-headless
  labels:
    app: polln
    component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP
  selector:
    app: polln
    component: api
  publishNotReadyAddresses: true
