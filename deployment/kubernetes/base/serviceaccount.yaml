# POLLN Kubernetes ServiceAccount
# Identity for the API pods

apiVersion: v1
kind: ServiceAccount
metadata:
  name: polln-api
  labels:
    app: polln
    component: api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: polln-api
  labels:
    app: polln
    component: api
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: polln-api
  labels:
    app: polln
    component: api
subjects:
- kind: ServiceAccount
  name: polln-api
roleRef:
  kind: Role
  name: polln-api
  apiGroup: rbac.authorization.k8s.io
