# POLLN Kubernetes ConfigMap
# Non-sensitive configuration data

apiVersion: v1
kind: ConfigMap
metadata:
  name: polln-config
  labels:
    app: polln
data:
  # Application Configuration
  polln-env: "production"
  polln-log-level: "info"
  polln-api-port: "3000"
  polln-api-host: "0.0.0.0"

  # Feature Flags
  polln-auth-enabled: "true"
  polln-rate-limit-rpm: "100"
  polln-telemetry-enabled: "true"

  # PostgreSQL Configuration
  postgres-host: "polln-postgres.postgres.svc.cluster.local"
  postgres-port: "5432"
  postgres-database: "polln"
  postgres-pool-min: "2"
  postgres-pool-max: "10"
  postgres-connection-timeout: "10000"
  postgres-idle-timeout: "10000"

  # Redis Configuration
  redis-host: "polln-redis.redis.svc.cluster.local"
  redis-port: "6379"
  redis-db: "0"
  redis-max-retries-per-request: "3"
  redis-retry-strategy: "exponential-backoff"
  redis-enable-ready-check: "true"
  redis-max-redis-not-ready-connections: "1000"

  # Monitoring Configuration
  prometheus-enabled: "true"
  prometheus-port: "9464"
  prometheus-path: "/metrics"

  # Tracing Configuration
  tracing-enabled: "true"
  tracing-sampler: "probabilistic"
  tracing-sampler-ratio: "0.1"
  tracing-exporter: "otlp-grpc"

  # Logging Configuration
  log-format: "json"
  log-level: "info"
  log-output: "stdout"

  # Resource Limits
  max-request-size: "10485760"  # 10MB
  max-concurrent-requests: "1000"
  request-timeout: "30000"      # 30 seconds

  # WebSocket Configuration
  websocket-heartbeat-interval: "30000"
  websocket-max-connections: "10000"
  websocket-message-queue-size: "1000"

  # Cache Configuration
  cache-ttl: "3600"             # 1 hour
  cache-max-size: "1000"

  # Agent Configuration
  agent-max-idle-time: "300000"  # 5 minutes
  agent-max-concurrent: "100"
  agent-timeout: "60000"         # 1 minute

  # Colony Configuration
  colony-max-agents: "1000"
  colony-max-colonies: "100"
  colony-shutdown-timeout: "30000"
